version: '3.8'

services:
  backend:
    build: .
    container_name: gida-backend
    ports:
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
      - ./logs:/app/logs
    env_file:
      - .env
    depends_on:
      - db
      - redis
    command: sh -c "npm install && npm run start:dev"

  db:
    image: postgis/postgis:15-3.3
    container_name: gida-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${DATABASE_USER}
      - POSTGRES_PASSWORD=${DATABASE_PASSWORD}
      - POSTGRES_DB=${DATABASE_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: gida-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

volumes:
  pgdata:
  redisdata: