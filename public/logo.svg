<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="shieldGrad" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#E26D5C"/>
      <stop offset="100%" stop-color="#8B2A1A"/>
    </radialGradient>
    <radialGradient id="innerGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FAF6F0"/>
      <stop offset="100%" stop-color="#EDE0D0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(139,42,26,0.35)"/>
    </filter>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="95" r="85" fill="none" stroke="#C04E38" stroke-width="2.5" opacity="0.4"/>
  <circle cx="100" cy="95" r="78" fill="none" stroke="#C04E38" stroke-width="1.5" opacity="0.25"/>

  <!-- Shield body -->
  <path d="M100 18 L162 42 L162 96 Q162 148 100 172 Q38 148 38 96 L38 42 Z"
        fill="url(#shieldGrad)" filter="url(#shadow)"/>

  <!-- Shield inner highlight -->
  <path d="M100 28 L154 49 L154 96 Q154 141 100 162 Q46 141 46 96 L46 49 Z"
        fill="url(#innerGrad)" opacity="0.15"/>

  <!-- Shield border top highlight -->
  <path d="M100 18 L162 42 L162 50 L100 26 L38 50 L38 42 Z"
        fill="white" opacity="0.12"/>

  <!-- Inner cream circle -->
  <circle cx="100" cy="96" r="46" fill="#FAF3EA" opacity="0.92"/>

  <!-- FG Monogram -->
  <!-- F -->
  <text x="72" y="108" font-family="Georgia, serif" font-size="42" font-weight="700"
        fill="#C04E38" opacity="0.95" letter-spacing="-2">FG</text>

  <!-- Green leaf accent -->
  <ellipse cx="155" cy="38" rx="7" ry="11" fill="#2A5C43" transform="rotate(-30 155 38)" opacity="0.9"/>
  <line x1="155" y1="27" x2="155" y2="49" stroke="#2A5C43" stroke-width="1.5" transform="rotate(-30 155 38)" opacity="0.7"/>
</svg>
